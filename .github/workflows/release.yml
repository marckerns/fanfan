name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Required to create releases and upload assets

env:
  APPLE_TEAM_ID: 8FUPL8QHFH
  SIGN_IDENTITY: "Developer ID Application: HAOBIN WU (8FUPL8QHFH)"

jobs:
  build-and-release:
    name: Build fanfan for macOS
    runs-on: macos-latest
    # Avoid running on forks where secrets are unavailable.
    if: github.repository == 'hoobnn/fanfan'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔍 Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Building version: $VERSION"

      - name: ⚙️ Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 🔑 Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # Make the temp keychain searchable alongside the default ones.
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Sanity check: identity must be visible to codesign.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "$SIGN_IDENTITY"
          rm -f "$CERT_PATH"

      - name: 🛠 Build fanfan-smcd
        run: |
          set -euo pipefail
          make -C tools/fanfan-smcd clean
          make -C tools/fanfan-smcd
          # Refresh the bundled copy that Xcode picks up as a Resources file.
          cp tools/fanfan-smcd/fanfan-smcd fanfan/Resources/fanfan-smcd

      - name: 🔨 Build fanfan
        run: |
          set -euo pipefail
          # Ad-hoc build first; we re-sign properly below to control ordering
          # (inner daemon binary must be signed before the outer .app).
          xcodebuild \
            -project fanfan.xcodeproj \
            -scheme fanfan \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            clean build

          BUILT_APP="build/Build/Products/Release/fanfan.app"
          if [ ! -d "$BUILT_APP" ]; then
            echo "❌ Built app not found at $BUILT_APP"
            find build -name "*.app" -type d
            exit 1
          fi

          mkdir -p release
          rm -rf release/fanfan.app
          cp -R "$BUILT_APP" release/fanfan.app
          echo "✅ Staged: release/fanfan.app"

      - name: ✍️ Code-sign with Developer ID
        run: |
          set -euo pipefail
          APP="release/fanfan.app"
          DAEMON="$APP/Contents/Resources/fanfan-smcd"
          ENTITLEMENTS="fanfan/Resources/fanfan.entitlements"

          if [ ! -f "$DAEMON" ]; then
            echo "❌ Daemon binary missing inside app bundle: $DAEMON"
            exit 1
          fi

          # Inner-most first.
          codesign --force --timestamp --options runtime \
            --sign "$SIGN_IDENTITY" \
            "$DAEMON"

          # Then the app, with hardened runtime + entitlements.
          codesign --force --timestamp --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$SIGN_IDENTITY" \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: 📜 Notarize and staple app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"

          NOTARIZE_ZIP="$RUNNER_TEMP/fanfan-notarize.zip"
          ditto -c -k --keepParent release/fanfan.app "$NOTARIZE_ZIP"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple release/fanfan.app
          xcrun stapler validate release/fanfan.app
          spctl --assess --type execute --verbose=2 release/fanfan.app

          rm -f "$KEY_PATH" "$NOTARIZE_ZIP"

      - name: 📦 Create ZIP archive
        run: |
          set -euo pipefail
          # ditto preserves xattrs (incl. the stapled ticket) across the round-trip.
          ditto -c -k --keepParent release/fanfan.app \
            "fanfan-v${{ steps.version.outputs.version }}-macos.zip"

          shasum -a 256 "fanfan-v${{ steps.version.outputs.version }}-macos.zip" \
            > "fanfan-v${{ steps.version.outputs.version }}-macos.zip.sha256"

          ls -lh "fanfan-v${{ steps.version.outputs.version }}-macos.zip"

      - name: 💿 Create, notarize and staple DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p dmg_source
          cp -R release/fanfan.app dmg_source/
          ln -s /Applications dmg_source/Applications

          DMG="fanfan-v${{ steps.version.outputs.version }}-macos.dmg"

          hdiutil create -volname "fanfan" \
            -srcfolder dmg_source \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            "$DMG"

          # The DMG container itself needs its own notarization + staple.
          codesign --force --timestamp --sign "$SIGN_IDENTITY" "$DMG"

          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"

          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 30m

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

          shasum -a 256 "$DMG" > "$DMG.sha256"

          rm -f "$KEY_PATH"

      - name: 📝 Generate release notes
        id: notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 🌬️ fanfan v${{ steps.version.outputs.version }}

          ### ✨ Features
          - 🌡️ Real-time CPU/GPU temperature monitoring
          - 💨 Manual and automatic fan speed control
          - 📊 Animated menu bar icon
          - 🚀 Launch at login support
          - 🎨 Modern liquid glass UI

          ### 📦 Installation

          **Option 1: GUI Installation (Recommended)**
          1. Download and open the DMG
          2. Drag fanfan.app to /Applications/
          3. Launch the app - it will prompt you to install the helper tool
          4. Click "Install Helper" and enter your password once
          5. Done! No more password prompts needed.

          **Option 2: Command Line Installation**

          Quick install (auto-detects latest version):
          ```bash
          curl -fsSL https://raw.githubusercontent.com/hoobnn/fanfan/main/scripts/install.sh | bash
          ```

          Or manual installation:
          ```bash
          curl -L https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/fanfan-v${{ steps.version.outputs.version }}-macos.zip -o fanfan.zip
          unzip fanfan.zip
          rm -rf /Applications/fanfan.app
          mv fanfan.app /Applications/

          # Install the privileged SMC daemon as a LaunchDaemon
          sudo mkdir -p /usr/local/libexec /Library/LaunchDaemons
          sudo cp /Applications/fanfan.app/Contents/Resources/fanfan-smcd /usr/local/libexec/fanfan-smcd
          sudo chown root:wheel /usr/local/libexec/fanfan-smcd
          sudo chmod 755 /usr/local/libexec/fanfan-smcd
          sudo cp /Applications/fanfan.app/Contents/Resources/com.hoobnn.fanfan.smcd.plist /Library/LaunchDaemons/
          sudo chown root:wheel /Library/LaunchDaemons/com.hoobnn.fanfan.smcd.plist
          sudo chmod 644 /Library/LaunchDaemons/com.hoobnn.fanfan.smcd.plist
          sudo launchctl bootstrap system /Library/LaunchDaemons/com.hoobnn.fanfan.smcd.plist
          sudo launchctl kickstart -k system/com.hoobnn.fanfan.smcd

          open /Applications/fanfan.app
          ```

          ### 📋 Requirements
          - macOS **26.0** or later (matches `MACOSX_DEPLOYMENT_TARGET` in the Xcode project)
          - Intel or Apple Silicon

          ### 🔐 SHA256 Checksums
          ```
          $(cat fanfan-v${{ steps.version.outputs.version }}-macos.zip.sha256)
          $(cat fanfan-v${{ steps.version.outputs.version }}-macos.dmg.sha256)
          ```

          ### 📚 [Full Documentation](https://github.com/${{ github.repository }}/blob/main/docs/README.md)

          ---
          **⭐ Like fanfan? Star the repo!**
          EOF

          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: fanfan v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            fanfan-v${{ steps.version.outputs.version }}-macos.zip
            fanfan-v${{ steps.version.outputs.version }}-macos.zip.sha256
            fanfan-v${{ steps.version.outputs.version }}-macos.dmg
            fanfan-v${{ steps.version.outputs.version }}-macos.dmg.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload artifacts (for non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v7
        with:
          name: fanfan-dev-build
          path: |
            fanfan-v${{ steps.version.outputs.version }}-macos.zip
            fanfan-v${{ steps.version.outputs.version }}-macos.dmg
          retention-days: 30

      - name: 🧹 Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: ✅ Done!
        run: |
          echo "✨ Build complete!"
          echo "📍 Version: ${{ steps.version.outputs.version }}"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "🔗 Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
          else
            echo "💾 Artifacts uploaded for manual testing"
          fi
